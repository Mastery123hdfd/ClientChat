L<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="VerdantLogo.png">


    <style>
        body {
            background: rgb(18, 19, 27);
            font-family: 'Comfortaa', sans-serif;
            font-size: 14px;
            color: white;
            padding: 20px;
        }

        #log {
            border: 1px solid #ffffff;
            background: #222;
            padding: 10px;
            color: white;
            height: 400px;
            overflow-y: auto;
            border-radius: 6px;
            box-shadow: inset 0 0 6px #0d0b24;
        }

        .inputbox {
            width: 300px;
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #ffffff;
            border-radius: 6px;
            box-shadow: inset 0 0 4px #000;
            font-family: 'Comfortaa', sans-serif;
            font-size: 14px;
        }

        .btn {
            padding: 8px 14px;
            margin-left: 6px;
            background: #2c2c2c;
            color: rgb(255, 255, 255);
            border: 1px solid #ffffff;
            border-radius: 6px;
            font-family: 'Comfortaa', sans-serif;
            cursor: pointer;
            box-shadow: inset 0 0 4px #202020;
        }

        #filelog{

            padding: 10px;
            color: white;
            overflow-y: auto;
        }

        .btn:hover {
            background: #555;
        }

        .chat {
            color: white;
        }

        .system {
             color: #7ec8ff;
            font-style: italic;
        }
        .dropup-menu {
            position: absolute;
            bottom: 60px; /* raises it above the + button */
            left: 20px;   /* adjust to match your + button position */
            background: #2c2c2c;
            border: 1px solid #ffffff;
            border-radius: 6px;
            box-shadow: 0 0 6px #000;
            padding: 6px 0;
            display: none;
            z-index: 999;
        }

        .dropup-item {
            background: #2c2c2c;
            color: white;
            border: none;
            padding: 8px 14px;
            width: 100%;
            text-align: left;
            font-family: 'Comfortaa', sans-serif;
            cursor: pointer;
        }

        .dropup-item:hover {
            background: #555;
        }



    </style>
</head>
<body>

<h2>WebSocket Client</h2>

<div id="log"></div>

<br>
<button id = "menu" class = "btn" onclick = "togglePlusMenu()">+</button>
<div id="plusMenu" class="dropup-menu">
    <button class="dropup-item" onclick="openPollCreator()">Create Poll</button>
    <button class="dropup-item" onclick="fileSelector()">Upload File</button>
</div>

<input type = "file" id = "fileBox" style = "display:none" onchange="handleSel(event)">
    
<input id="msg" class = "inputbox" placeholder="Type a message">
<button id = "clickbutton" class = "btn" onclick="sendMessage()">Send</button>
<input id = "prinput" class = "inputbox" placeholder = "Type in pr tag">
<button id="prSwitch" class = "btn" onclick="changePR()">Change Private Room</button>

<div id ="filelog"></div>
    
<br>
<hr style="margin: 20px 0; border: 1px solid #444;">
    
<input id = "usernameIn" class = "inputbox" placeholder = "Username">
<input id = "passIn" class = "inputbox" placeholder = "Password">
<button id="loginButton" class = "btn" onclick = "InitLogin()">Login / Signup</button>

<script>
    
    console.log("SCRIPT LOADED", Date.now());

    const logBox = document.getElementById("log");
    
    const ws = new WebSocket("wss://clientservertestexp.onrender.com");
    
    const box = document.getElementById("msg");
    const btn = document.getElementById("clickbutton");
    
    const prin = document.getElementById("prinput");
    const prout = document.getElementById("prSwitch");
    
    const userin = document.getElementById("usernameIn");
    const passin = document.getElementById("passIn");
    const loginbutton = document.getElementById("loginButton");
    
    
    const fileBox = document.getElementById("fileBox");
    const filelog = document.getElementById("filelog");

    ws.binaryType = "arraybuffer";
    
    let prtag = "main";
    let firstlogin = true;
    let token = null;

    let filebuffer = [];
    let stackBuffer = [];
    let stackfileBuffer = [];
    
    if(firstlogin){
        t = localStorage.getItem("sessionToken");
        if(t){
            token = t;
        }
        
    }
    box.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            btn.click();   
        }
    });

    function fileSelector(){
        fileBox.click();
    }
    function togglePlusMenu() {
        const menu = document.getElementById("plusMenu");
        menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }


    
        document.addEventListener("click", (e) => {
            const menu = document.getElementById("plusMenu");
            const plusBtn = document.getElementById("menu");

            if (!menu.contains(e.target) && e.target !== plusBtn) {
                menu.style.display = "none";
            }
        });
    function openPollCreator() {
    
        const title = prompt("Poll question:");
        if (!title) return;

        const options = prompt("Options (comma separated):");
        if (!options) return;

        const timer = prompt("Timer in seconds:");
        if (!timer) return;

        ws.send(JSON.stringify({
            type: "PollCreate",
            v1: title,
            v2: options.split(",").map(o => o.trim()),
            v3: timer
        }));
    }


    function handleSel(e) {
        const files = e.target.files;
        
        if (!files || files.length === 0) return;

        console.log("handleSel fired");
        console.log("filelog element:", filelog);
        
        for (const file of files) {
            filebuffer.push(file);
            logFileName(file.name);
        }
    }


    function logFileName(filename) {
        const p = document.createElement("p");
        p.textContent = filename;
        p.classList.add("system");
        filelog.appendChild(p);
    }
    
    function changePR(){
        const packet = JSON.stringify({
            type: "changePrTag",
            v1: prin.value
        });
        prtag = prin.value;
        document.getElementById("log").innerHTML = "";
        ws.send(packet);
        prin.value = "";

    }
   
    
    
    function log(text, type = "chat",msgid) {
        const p = document.createElement("p");
        p.textContent = text;
        p.id = "chat-"+msgid;
        if (type === "system") {
            p.classList.add("system");
        } else {
            p.classList.add("chat");
        }
        logBox.appendChild(p);
        const scrollCheck = logBox.scrollHeight - logBox.scrollTop - logBox.clientHeight < 600;

        if (scrollCheck) {
            logBox.scrollTop = logBox.scrollHeight;
        }
    }
    function logPoll(PollObject){
        const opmap = PollObject.OptionMap;
        const keyarray = opmap.keys();
        const p = document.createElement("p");

        let totalvotes = k;

        p.id = "poll-" + PollObject.msgid;

        p.classList.add("chat");
        for(key of keyarray){
            totalvotes += opmap.get(key).optionvotes;
        }
        for(key of keyarray){
            let btn = document.createElement("button");
            const option = opmap.get(key)
            btn.textContent = "" + key + ". " + option.optionname + "| " + option.optionvotes + " votes| - " + ((votes / totalVotes) * 100).toFixed(1) + "%";
            btn.className = "btn";
            p.appendChild(btn);
        }
        logBox.appendChild(p);
    }
    function updatePoll(PollObject) {
        const pollDiv = document.getElementById("poll-" + PollObject.msgid);
        if (!pollDiv) return; // poll not in DOM yet

        const opmap = PollObject.OptionMap;
        const keyarray = Array.from(opmap.keys());

        // Recalculate total votes
        let totalVotes = 0;
        for (const key of keyarray) {
            totalVotes += opmap.get(key).optionvotes;
        }

        // Update each button inside the poll
        const buttons = pollDiv.querySelectorAll("button");

        let i = 0;
        for (const key of keyarray) {
            const option = opmap.get(key);
            const votes = option.optionvotes;

            const percent = totalVotes === 0
                ? 0
                : ((votes / totalVotes) * 100).toFixed(1);

            const btn = buttons[i];
            if (btn) {
                btn.textContent =
            `${key}. ${option.optionname} | ${votes} votes | ${percent}%`;
            }

            i++;
        }
    }

    function logFile(buffer, type, name,msgid) {
        const p = document.createElement("p");
        p.classList.add("chat");
        p.id = msgid;

        // Optional: show image preview if it's an image
        if (type.startsWith("image/")) {
            const arrbuff = new Blob([buffer], { type: type });
            const url = URL.createObjectURL(arrbuff);

            const img = document.createElement("img");
            img.src = url;
            img.alt = name;
            img.style.maxWidth = "200px";
            img.style.maxHeight = "200px";
            img.style.display = "block";
            img.style.marginBottom = "6px";

            p.appendChild(img);

            const btn = document.createElement("button");
            btn.textContent = "Download";
            btn.className = "btn";
            btn.onclick = () => {
                const a = document.createElement("a");
                a.href = url;
                a.download = name;
                a.style.display = "none";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                 URL.revokeObjectURL(url);
            };

            p.appendChild(btn);
        } else {
        // Non-image: just show filename and download button
            const label = document.createElement("span");
            label.textContent = name;
            label.style.marginRight = "10px";

            const btn = document.createElement("button");
            btn.textContent = "Download";
            btn.className = "btn";
            btn.onclick = () => {
              const blob = new Blob([buffer], { type: type });
              const url = URL.createObjectURL(blob);

              const a = document.createElement("a");
              a.href = url;
              a.download = name;
              a.style.display = "none";
              document.body.appendChild(a);
              a.click();
             document.body.removeChild(a);
              URL.revokeObjectURL(url);
            };

            p.appendChild(label);
            p.appendChild(btn);
        }

        logBox.appendChild(p);

        const scrollCheck = logBox.scrollHeight - logBox.scrollTop - logBox.clientHeight < 1000;
        if (scrollCheck) {
           logBox.scrollTop = logBox.scrollHeight;
        }
    }


    function Login(user, pass){
        if(userin.value.length>400) return;
        if(passin.value.length>400) return;
        LoginPacket = (JSON.stringify({
            type: "login",
            msg:null,
            tag:null,
            v1:user,
            v2:pass
        }));
        log("LoginSent", "system");
        passin.value = "";
        userin.value = "";
        ws.send(LoginPacket);
    }
    function InitLogin(){
        Login(userin.value, passin.value);
        firstlogin=false;
    }

    
    ws.onopen = () => {
        console.log("CLIENT: ws.onopen fired");

        log("Connected to server");
        const token = localStorage.getItem("sessionToken");
        if (token) {
            ws.send(JSON.stringify({
                type: "sessionrestart",
                token: token
            }));
        }
    };

    let meta = null;
    let next = true;

    ws.onmessage = (event) => {
        console.log(typeof event);
        try{
        console.log(JSON.stringify(event));
        }catch(e){
            console.log(e);
        }
        try{
            
            if (event.data instanceof ArrayBuffer) {
                if (meta === null) {
                    console.log("Binary received but no meta! The file has been converted to a .bin file, please ask the sender for the file extension.");
                    logFile(event.data, "application/octet-stream", "unknown", "NO-TAG-FOUND -- Type: File");
                    return;
                }
                console.log("Data Received!!!");

                logFile(event.data, meta.type, meta.name, "File-"+meta.id);
                meta = null;

                /*if(stackBuffer.length !== 0){
                    ws.send(stackBuffer.pop());
                    console.log("META SENT");
                }
                if(stackfileBufer.length !== 0){
                    ws.send(stackfileBuffer.pop());
                    console.log("DATA SENT");
                }*/
                
                return;
            }

            const data = JSON.parse(event.data);
            if(data.type === "Poll"){
                console.log("Poll received!");
                const poll = data.polldata;
                console.log("Poll quesiton is: " + poll.question);
                return;
                logPoll(event.data);
            }
            if(data.type ==="PollUpdate"){
                logPoll(event.data);
            }

            if (data.type == "clearHistory") {
                logBox.innerHTML = "";
                log("Chat cleared by admin");
                return;
            }
            if(data.type == "clearHistoryChatless"){
                logBox.innerHTML = "";
                return;
            }
            else if(data.type == "strikemsg"){
                const chats = logBox.querySelectorAll(".chat");
                const lastChat = chats[chats.length - 1];
                if (lastChat) lastChat.remove();
                return;
            }
            else if (data.type == "log"){
                return;
            }
            else if(data.type == "sessionToken"){
                token = data.tokenid;
                localStorage.setItem("sessionToken", data.tokenid);
                return;
            }
            else if(data.type == "imgmeta"){
                meta = {
                    name: data.name,
                    size: data.size,
                    type: data.mimetype,
                    isImg: true
                };
                console.log("Image meta received");
                return;
            }
            else if(data.type == "regmeta"){
                meta = {
                    name: data.name,
                    size: data.size,
                    type: data.mimetype,
                    isImg: false
                };
                console.log("Non-image meta received");
                return;
            }
            else{
                const output = data.message;
                log("" + output, "chat",data.msgid);
            }

        } catch(e){
            log("" + event.data, "system");
        }
        
    };

    ws.onclose = () => {
        log("Connection closed. Retrying in 3 seconds...");
        setTimeout(() => location.reload(), 3000);
    };

    ws.onerror = (err) => {
        log("WebSocket error");
        console.error(err);
    };

    async function sendMessage() {
        
        const text = document.getElementById("msg").value;
        if(filebuffer.length !== 0){
            for(const file of filebuffer){
                if(file.size >= 13107200){log("File size limit: 12.5 mb", "system"); return;} // Limit size: 12.5mb.
                if(file.type.startsWith("image/")){
                    //imgmeta
                    stackBuffer.push(JSON.stringify(
                        {
                            type: "imgmeta",
                            msg: file.name,
                            v1: file.size,
                            v2: file.type,
                            tag:prtag
                        }
                        
                    ));
                    stackfileBuffer.push(await file.arrayBuffer());
                    if(next){
                        ws.send(stackBuffer.pop());
                        console.log("Image Metadata Sent!");
                        ws.send(stackfileBuffer.pop());
                        console.log("IMAGE sent!");
                        next = false
                    }
                    
                } else{
                    //regmeta
                    stackBuffer.push(JSON.stringify({
                        type: "regmeta",
                        msg: file.name,
                        v1: file.size,
                        v2: file.type,
                        tag: prtag
                    }));
                    stackfileBuffer.push(await file.arrayBuffer());
                    if(next){
                        ws.send(stackBuffer.pop());
                        console.log("Non-image Metadata Sent!");
                        ws.send(stackfileBuffer.pop());
                        console.log("NON-IMAGE sent!!");
                        next = false;
                        
                    }
                   
                }
            }
            // Clear filelog
            filelog.innerHTML = "";
            filebuffer = [];
            next = true;
        }
        if(text.trim() == ""){
            return;
        }
        if(text.length >= 1000){
            log("Your message is too large!");
            return;
        }
        const data = (JSON.stringify({type: "empty", msg: text, tag: prtag}));
        ws.send(data);
        document.getElementById("msg").value = "";
    }
</script>

</body>
</html>
